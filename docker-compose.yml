services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: earth-mock-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\" || exit 1",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16
    container_name: earth-mock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: earth_mock
      POSTGRES_USER: earth_user
      POSTGRES_PASSWORD: earth_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earth_user -d earth_mock"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: earth-mock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: earth_mock
      POSTGRES_USER: earth_user
      POSTGRES_PASSWORD: earth_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

